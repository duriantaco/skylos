# Skylos pre-commit configuration
# Fast staged-only local hook.
# Checks security, secrets, and quality in staged source/config files.
# Full repo and diff-aware enforcement runs in CI.

repos:
  - repo: local
    hooks:
      - id: skylos-gate
        name: Skylos Staged Gate
        entry: python -m skylos.cli
        language: python
        additional_dependencies:
          - "inquirer>=3.0.3"
          - "libcst>=1.8.2"
          - "rich>=14.0.0"
          - "textual>=1.0.0"
          - "keyring>=25.6.0,!=3.4.2"
          - "requests"
          - "tree-sitter>=0.25.2"
          - "tree-sitter-typescript>=0.23.2"
          - "tree-sitter-go>=0.23.0"
          - "tree-sitter-java>=0.23.0"
          - "tree-sitter-php>=0.24.1"
          - "tree-sitter-rust>=0.24.2"
          - "tomli>=2.0.1; python_version < '3.11'"
          - "pyyaml"
          - "networkx"
          - "pyperclip"
          - "ca9>=0.1.0"
          - "mcp>=1.0.0"
        pass_filenames: false
        require_serial: true
        args: ["agent", "pre-commit", "."]
        stages: [pre-commit]
