<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="640" viewBox="0 0 1280 640">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#07111f"/>
      <stop offset="0.58" stop-color="#0d1828"/>
      <stop offset="1" stop-color="#10283c"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>

  <rect width="1280" height="640" fill="url(#bg)"/>
  <rect x="52" y="54" width="1176" height="532" rx="34" fill="#0b1423" opacity="0.72" filter="url(#shadow)"/>
  <rect x="52" y="54" width="1176" height="532" rx="34" fill="none" stroke="#1d3b52" stroke-width="2"/>

  <rect x="94" y="92" width="158" height="42" rx="21" fill="#0f2d3d" stroke="#1f6f8f"/>
  <text x="173" y="120" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="800" fill="#7dd3fc">OPEN SOURCE</text>

  <text x="94" y="205" font-family="Inter, Arial, sans-serif" font-size="88" font-weight="800" fill="#f8fafc">Skylos</text>
  <text x="98" y="260" font-family="Inter, Arial, sans-serif" font-size="34" font-weight="750" fill="#e2e8f0">Stop merging dead code</text>
  <text x="98" y="302" font-family="Inter, Arial, sans-serif" font-size="30" font-weight="650" fill="#cbd5e1">and silent security regressions.</text>

  <rect x="96" y="354" width="452" height="70" rx="16" fill="#081826" stroke="#1e4964"/>
  <text x="126" y="398" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700" fill="#e0f2fe">pip install skylos</text>
  <text x="360" y="398" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700" fill="#38bdf8">and</text>
  <text x="416" y="398" font-family="Inter, Arial, sans-serif" font-size="27" font-weight="700" fill="#e0f2fe">skylos .</text>

  <text x="96" y="482" font-family="Inter, Arial, sans-serif" font-size="23" font-weight="600" fill="#94a3b8">GitHub Action  |  VS Code  |  MCP server</text>

  <rect x="626" y="98" width="548" height="444" rx="28" fill="#071827" stroke="#24506a" stroke-width="2"/>
  <rect x="672" y="136" width="226" height="38" rx="19" fill="#38bdf8"/>
  <text x="785" y="162" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="19" font-weight="800" fill="#05212b">REAL OSS PROOF</text>

  <text x="672" y="224" font-family="Inter, Arial, sans-serif" font-size="32" font-weight="800" fill="#f8fafc">Accepted cleanup PRs in</text>

  <g font-family="Inter, Arial, sans-serif" font-size="28" font-weight="750">
    <text x="672" y="284" fill="#e2e8f0">Black</text>
    <text x="868" y="284" fill="#e2e8f0">NetworkX</text>
    <text x="672" y="336" fill="#e2e8f0">Optuna</text>
    <text x="868" y="336" fill="#e2e8f0">mitmproxy</text>
    <text x="672" y="388" fill="#e2e8f0">pypdf</text>
    <text x="868" y="388" fill="#e2e8f0">beets</text>
    <text x="672" y="440" fill="#e2e8f0">Flagsmith</text>
  </g>

  <rect x="672" y="470" width="408" height="2" fill="#1e4964"/>
  <text x="672" y="505" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#93c5fd">Maintainer-merged PRs.</text>
  <text x="672" y="531" font-family="Inter, Arial, sans-serif" font-size="20" font-weight="600" fill="#93c5fd">Not endorsement claims.</text>
</svg>
