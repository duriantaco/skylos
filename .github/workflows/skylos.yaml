name: Skylos Advisory Scan

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: "1.22"

      - uses: astral-sh/setup-uv@e4db8464a088ece1b920f60402e813ea4de65b8f # v4

      - name: Build repo Go engine
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/skylos-go-build /tmp/skylos-go-gopath
          cd skylos/engines/go
          GOCACHE=/tmp/skylos-go-build GOPATH=/tmp/skylos-go-gopath go build -o skylos-go ./cmd/skylos-go

      - name: Install trusted Skylos for pull requests
        if: github.event_name == 'pull_request'
        run: |
          uv venv --python 3.11
          uv pip install --python .venv/bin/python "skylos>=4.7.0"
          .venv/bin/skylos --version

      - name: Use repo Skylos on trusted refs
        if: github.event_name != 'pull_request'
        run: |
          uv venv --python 3.11
          uv pip install --python .venv/bin/python -e .
          .venv/bin/python -c "import skylos; print('skylos from:', skylos.__file__)"
          .venv/bin/python -c "import skylos.visitors.languages; print('languages OK')"

      - name: Resolve diff base
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.base_ref || 'main' }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=origin/${{ github.ref_name || 'main' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Skylos
        id: scan
        env:
          REPORT: skylos_${{ github.run_number }}_${{ github.sha }}.json
          DIFF_BASE: ${{ steps.diff.outputs.base }}
        shell: bash
        run: |
          echo "REPORT=$REPORT" >> "$GITHUB_OUTPUT"
          if [ -n "$DIFF_BASE" ]; then
            .venv/bin/skylos . --quality --danger --secrets --diff-base "$DIFF_BASE" --diff "$DIFF_BASE" --json -o "$REPORT"
          else
            .venv/bin/skylos . --quality --danger --secrets --baseline --json -o "$REPORT"
          fi

      - name: Report findings (advisory)
        if: always()
        env:
          REPORT: ${{ steps.scan.outputs.REPORT }}
        run: |
          .venv/bin/skylos cicd gate --input "$REPORT" --summary --advisory

      - name: Block new high-risk security findings
        if: steps.scan.outcome == 'success'
        env:
          REPORT: ${{ steps.scan.outputs.REPORT }}
        run: |
          python - "$REPORT" <<'PY'
          import json
          import os
          import sys

          severity_rank = {"LOW": 1, "MEDIUM": 2, "HIGH": 3, "CRITICAL": 4}
          report_path = sys.argv[1]
          with open(report_path, encoding="utf-8") as fh:
              report = json.load(fh)

          blocking = []
          for category in ("danger", "secrets"):
              for finding in report.get(category, []) or []:
                  severity = str(
                      finding.get("severity") or ("HIGH" if category == "secrets" else "")
                  ).upper()
                  if severity_rank.get(severity, 0) >= severity_rank["HIGH"]:
                      blocking.append((category, severity, finding))

          if not blocking:
              print("No new high-risk security findings.")
              sys.exit(0)

          summary = os.environ.get("GITHUB_STEP_SUMMARY")
          lines = [
              "## Blocking Skylos findings",
              "",
              "New HIGH/CRITICAL security or secret findings were detected in this diff.",
              "",
          ]

          for category, severity, finding in blocking[:20]:
              file_path = finding.get("file") or finding.get("file_path") or "unknown"
              line = finding.get("line") or finding.get("line_number") or 1
              rule = finding.get("rule_id") or finding.get("rule") or category
              message = finding.get("message") or "High-risk finding"
              detail = f"{severity} {rule} {file_path}:{line} - {message}"
              print(detail)
              print(f"::error file={file_path},line={line},title=Skylos {rule}::{detail}")
              lines.append(f"- `{severity}` `{rule}` {file_path}:{line} - {message}")

          if len(blocking) > 20:
              lines.append(f"- ...and {len(blocking) - 20} more finding(s)")

          if summary:
              with open(summary, "a", encoding="utf-8") as fh:
                  fh.write("\n".join(lines) + "\n")

          raise SystemExit(1)
          PY

      - name: GitHub annotations
        if: always()
        env:
          REPORT: ${{ steps.scan.outputs.REPORT }}
        run: |
          .venv/bin/skylos cicd annotate --input "$REPORT"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ${{ steps.scan.outputs.REPORT }}
          path: ${{ steps.scan.outputs.REPORT }}

      - name: Summarize in job log
        if: always()
        run: |
          echo "Skylos report: ${{ steps.scan.outputs.REPORT }}" >> $GITHUB_STEP_SUMMARY
