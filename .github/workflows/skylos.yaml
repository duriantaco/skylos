name: Skylos Advisory Scan

on:
  pull_request:
  push:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - uses: astral-sh/setup-uv@v4

      - name: Build repo Go engine
        if: github.event_name != 'pull_request'
        run: |
          mkdir -p /tmp/skylos-go-build /tmp/skylos-go-gopath
          cd skylos/engines/go
          GOCACHE=/tmp/skylos-go-build GOPATH=/tmp/skylos-go-gopath go build -o skylos-go ./cmd/skylos-go

      - name: Install trusted Skylos for pull requests
        if: github.event_name == 'pull_request'
        run: |
          SKYLOS_PR_VENV="${RUNNER_TEMP}/skylos-pr-scan-venv"
          python -m venv "$SKYLOS_PR_VENV"
          "$SKYLOS_PR_VENV/bin/python" -m pip install \
            --isolated \
            --no-input \
            --disable-pip-version-check \
            --index-url https://pypi.org/simple \
            --upgrade pip
          "$SKYLOS_PR_VENV/bin/python" -m pip install \
            --isolated \
            --no-input \
            --disable-pip-version-check \
            --index-url https://pypi.org/simple \
            --only-binary=:all: \
            "skylos>=4.7.0"
          echo "SKYLOS_BIN=$SKYLOS_PR_VENV/bin/skylos" >> "$GITHUB_ENV"
          "$SKYLOS_PR_VENV/bin/skylos" --version

      - name: Use repo Skylos on trusted refs
        if: github.event_name != 'pull_request'
        run: |
          uv venv --python 3.11
          uv pip install --python .venv/bin/python -e .
          echo "SKYLOS_BIN=.venv/bin/skylos" >> "$GITHUB_ENV"
          .venv/bin/python -c "import skylos; print('skylos from:', skylos.__file__)"
          .venv/bin/python -c "import skylos.visitors.languages; print('languages OK')"

      - name: Resolve diff base
        id: diff
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "base=origin/${{ github.base_ref || 'main' }}" >> "$GITHUB_OUTPUT"
          elif [ -n "${{ github.event.before }}" ] && [ "${{ github.event.before }}" != "0000000000000000000000000000000000000000" ]; then
            echo "base=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
          else
            echo "base=origin/${{ github.ref_name || 'main' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run Skylos
        id: scan
        env:
          REPORT: skylos_${{ github.run_number }}_${{ github.sha }}.json
          DIFF_BASE: ${{ steps.diff.outputs.base }}
          PYTHONSAFEPATH: "1"
        shell: bash
        run: |
          echo "REPORT=$REPORT" >> "$GITHUB_OUTPUT"
          if [ -n "$DIFF_BASE" ]; then
            "$SKYLOS_BIN" . --quality --danger --secrets --diff-base "$DIFF_BASE" --diff "$DIFF_BASE" --json -o "$REPORT"
          else
            "$SKYLOS_BIN" . --quality --danger --secrets --baseline --json -o "$REPORT"
          fi

      - name: Report findings (advisory)
        if: always()
        env:
          REPORT: ${{ steps.scan.outputs.REPORT }}
          PYTHONSAFEPATH: "1"
        run: |
          "$SKYLOS_BIN" cicd gate --input "$REPORT" --summary --advisory

      - name: GitHub annotations
        if: always()
        env:
          REPORT: ${{ steps.scan.outputs.REPORT }}
          PYTHONSAFEPATH: "1"
        run: |
          "$SKYLOS_BIN" cicd annotate --input "$REPORT"

      - name: Upload report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.scan.outputs.REPORT }}
          path: ${{ steps.scan.outputs.REPORT }}

      - name: Summarize in job log
        if: always()
        run: |
          echo "Skylos report: ${{ steps.scan.outputs.REPORT }}" >> $GITHUB_STEP_SUMMARY
